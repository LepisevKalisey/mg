# Security and encryption configuration

# Encryption settings
encryption:
  algorithm: "AES-256-GCM"  # Encryption algorithm
  key_derivation: "PBKDF2"  # Key derivation function
  iterations: 100000  # Number of iterations for key derivation
  salt_bytes: 16  # Size of salt in bytes
  key_bytes: 32  # Size of encryption key in bytes
  iv_bytes: 12  # Size of initialization vector in bytes
  tag_bytes: 16  # Size of authentication tag in bytes

# Password policy
password_policy:
  min_length: 12  # Minimum password length
  require_uppercase: true  # Require at least one uppercase letter
  require_lowercase: true  # Require at least one lowercase letter
  require_digits: true  # Require at least one digit
  require_special: true  # Require at least one special character
  max_age_days: 90  # Maximum password age in days
  history_count: 5  # Number of previous passwords to remember

# Token settings
token:
  access_token_lifetime: 3600  # 1 hour in seconds
  refresh_token_lifetime: 604800  # 7 days in seconds
  algorithm: "HS256"  # JWT signing algorithm
  issuer: "mg-digest"  # Token issuer
  audience: "mg-digest-users"  # Token audience

# Session settings
session:
  idle_timeout: 1800  # 30 minutes in seconds
  absolute_timeout: 28800  # 8 hours in seconds
  remember_me_duration: 2592000  # 30 days in seconds

# API security
api_security:
  rate_limit_enabled: true  # Enable rate limiting
  rate_limit_requests: 100  # Requests per window
  rate_limit_window: 60  # Window size in seconds
  require_https: true  # Require HTTPS for all API requests
  cors_enabled: true  # Enable CORS
  cors_origins: ["*"]  # Allowed origins for CORS