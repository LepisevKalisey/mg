# Monitoring and alerting configuration

# Metrics collection
metrics:
  enabled: true
  endpoint: "/metrics"  # Prometheus metrics endpoint
  interval: 15  # Collection interval in seconds
  labels:  # Default labels for all metrics
    application: "mg-digest"
    environment: "${ENV:production}"  # Environment variable with default
  
  # Metric types to collect
  collect:
    # System metrics
    system:
      enabled: true
      cpu: true
      memory: true
      disk: true
      network: true
    
    # Application metrics
    application:
      enabled: true
      requests: true
      responses: true
      errors: true
      latency: true
    
    # Database metrics
    database:
      enabled: true
      connections: true
      queries: true
      transactions: true
      errors: true
    
    # Custom business metrics
    business:
      enabled: true
      sources_processed: true
      messages_collected: true
      summaries_generated: true
      digests_published: true
      llm_tokens_used: true
      llm_costs: true

# Logging configuration for monitoring
logging:
  metrics_enabled: true  # Enable logging metrics
  log_level_counts: true  # Count logs by level
  log_pattern_matching:  # Count logs matching patterns
    error_patterns:
      - "Exception"
      - "Error:"
      - "Failed to"
    warning_patterns:
      - "Warning:"
      - "Deprecated"

# Health checks
health_checks:
  enabled: true
  endpoint: "/health"  # Health check endpoint
  interval: 30  # Check interval in seconds
  timeout: 5  # Check timeout in seconds
  
  # Services to check
  services:
    # Database health check
    database:
      enabled: true
      timeout: 3  # Check timeout in seconds
      query: "SELECT 1"  # Query to execute
    
    # External API health checks
    external_apis:
      enabled: true
      timeout: 5  # Check timeout in seconds
      endpoints:
        - name: "openai"
          url: "https://api.openai.com/v1/models"
          method: "GET"
          headers:
            Authorization: "Bearer ${OPENAI_API_KEY}"
        - name: "telegram"
          url: "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe"
          method: "GET"

# Alerting configuration
alerting:
  enabled: true
  
  # Alert channels
  channels:
    # Email alerts
    email:
      enabled: true
      from: "alerts@mg-digest.example.com"
      to: "${NOTIFICATION_EMAIL}"
      subject_prefix: "[MG Digest Alert]"
    
    # Telegram alerts
    telegram:
      enabled: true
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      chat_id: "${TELEGRAM_ADMIN_CHAT_ID}"
    
    # Webhook alerts
    webhook:
      enabled: false
      url: "https://example.com/webhook"
      method: "POST"
      headers:
        Content-Type: "application/json"
        Authorization: "Bearer ${WEBHOOK_TOKEN}"
  
  # Alert rules
  rules:
    # System alerts
    system:
      - name: "high_cpu_usage"
        description: "High CPU usage detected"
        query: "system_cpu_usage > 0.9"
        duration: "5m"
        severity: "warning"
        channels: ["email", "telegram"]
      - name: "high_memory_usage"
        description: "High memory usage detected"
        query: "system_memory_usage > 0.9"
        duration: "5m"
        severity: "warning"
        channels: ["email", "telegram"]
    
    # Application alerts
    application:
      - name: "high_error_rate"
        description: "High error rate detected"
        query: "rate(application_errors_total[5m]) > 0.1"
        duration: "5m"
        severity: "critical"
        channels: ["email", "telegram"]
      - name: "high_latency"
        description: "High request latency detected"
        query: "application_request_duration_seconds{quantile=\"0.95\"} > 2"
        duration: "5m"
        severity: "warning"
        channels: ["email", "telegram"]
    
    # Business alerts
    business:
      - name: "llm_cost_budget"
        description: "LLM cost budget exceeded"
        query: "sum(business_llm_costs_total) > ${DAILY_BUDGET_LIMIT}"
        duration: "1h"
        severity: "critical"
        channels: ["email", "telegram"]
      - name: "digest_publication_failure"
        description: "Digest publication failed"
        query: "increase(business_digests_publication_failures_total[1d]) > 0"
        duration: "5m"
        severity: "critical"
        channels: ["email", "telegram"]