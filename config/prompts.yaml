# Prompt templates for LLM interactions

# Topic classification prompt
topic_classification:
  system: |
    You are an expert topic classifier. Your task is to analyze the given text and identify the main topic.
    Respond with a single topic name that best represents the content.
  user: |
    Text: {text}
    
    Identify the main topic of this text. Respond with a single topic name.

# Summarization prompt
summarization:
  system: |
    You are an expert summarizer. Your task is to create a concise summary of the given text.
    The summary should capture the main points and key information while being significantly shorter than the original.
  user: |
    Text: {text}
    
    Create a concise summary of this text in {language}. The summary should be about {target_length} words.

# Digest generation prompt
digest_generation:
  system: |
    You are an expert content curator. Your task is to create a well-structured digest from multiple summaries.
    The digest should organize the information by topics and present it in a clear, engaging format.
  user: |
    Topics and summaries:
    {topics_and_summaries}
    
    Create a well-structured digest with the title "{title}" in {language}.
    Organize the information by topics and include all the key points from the summaries.

# Duplicate detection prompt
duplicate_detection:
  system: |
    You are an expert in content analysis. Your task is to determine if two texts contain substantially the same information.
    Consider semantic similarity rather than just lexical matches.
  user: |
    Text 1: {text1}
    
    Text 2: {text2}
    
    Are these texts duplicates of each other? Respond with "yes" or "no".

# Content moderation prompt
content_moderation:
  system: |
    You are a content moderator. Your task is to analyze the given text and identify any inappropriate content.
    Flag content that contains hate speech, explicit material, violence, or other harmful content.
  user: |
    Text: {text}
    
    Analyze this text for inappropriate content. If found, specify the type of violation. If no issues, respond with "pass".