# API server configuration

# Server settings
server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  timeout: 60
  debug: false

# CORS settings
cors:
  allow_origins: ["*"]
  allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allow_headers: ["*"]
  allow_credentials: true
  max_age: 600

# Authentication
auth:
  token_expiry: 86400  # 24 hours in seconds
  refresh_token_expiry: 604800  # 7 days in seconds
  algorithm: "HS256"
  access_token_url: "/api/auth/token"

# Rate limiting
rate_limit:
  enabled: true
  requests_per_minute: 60
  burst: 100

# Endpoints
endpoints:
  # Admin API endpoints
  admin:
    sources: "/api/admin/sources"
    topics: "/api/admin/topics"
    summaries: "/api/admin/summaries"
    digests: "/api/admin/digests"
    settings: "/api/admin/settings"
    sessions: "/api/admin/sessions"
  
  # Public API endpoints
  public:
    health: "/api/health"
    metrics: "/api/metrics"