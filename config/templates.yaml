# Message and notification templates

# Digest templates
digest:
  # HTML template for digest emails
  email_html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <title>{{ title }}</title>
      <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        h2 { color: #3498db; margin-top: 30px; }
        .topic { background-color: #f9f9f9; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        .summary { margin-bottom: 15px; padding-left: 15px; border-left: 3px solid #3498db; }
        .footer { margin-top: 30px; font-size: 0.8em; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 10px; }
      </style>
    </head>
    <body>
      <h1>{{ title }}</h1>
      
      <p>{{ introduction }}</p>
      
      {% for topic in topics %}
      <div class="topic">
        <h2>{{ topic.name }}</h2>
        {% for summary in topic.summaries %}
        <div class="summary">
          <p>{{ summary.content }}</p>
          <p><small>Source: {{ summary.source }}</small></p>
        </div>
        {% endfor %}
      </div>
      {% endfor %}
      
      <div class="footer">
        <p>This digest was automatically generated by MG Digest.</p>
        <p>To unsubscribe, please click <a href="{{ unsubscribe_url }}">here</a>.</p>
      </div>
    </body>
    </html>
  
  # Plain text template for digest emails
  email_text: |
    {{ title }}
    
    {{ introduction }}
    
    {% for topic in topics %}
    ## {{ topic.name }}
    
    {% for summary in topic.summaries %}
    - {{ summary.content }}
      Source: {{ summary.source }}
    
    {% endfor %}
    {% endfor %}
    
    --
    This digest was automatically generated by MG Digest.
    To unsubscribe, please visit: {{ unsubscribe_url }}
  
  # Telegram template for digest messages
  telegram: |
    <b>{{ title }}</b>
    
    {{ introduction }}
    
    {% for topic in topics %}
    <b>{{ topic.name }}</b>
    
    {% for summary in topic.summaries %}
    • {{ summary.content }}
    <i>Source: {{ summary.source }}</i>
    
    {% endfor %}
    {% endfor %}

# Notification templates
notification:
  # Error notification template
  error: |
    [ERROR] {{ timestamp }}
    
    Component: {{ component }}
    Error Type: {{ error_type }}
    
    Message: {{ message }}
    
    Details:
    {{ details }}
    
    Stack Trace:
    {{ stack_trace }}
  
  # Digest ready notification template
  digest_ready: |
    [DIGEST READY] {{ timestamp }}
    
    A new digest "{{ title }}" is ready for review.
    
    Topics: {{ topic_count }}
    Summaries: {{ summary_count }}
    
    Review URL: {{ review_url }}
  
  # System status notification template
  system_status: |
    [SYSTEM STATUS] {{ timestamp }}
    
    Status: {{ status }}
    
    Components:
    - Database: {{ database_status }}
    - API: {{ api_status }}
    - Worker: {{ worker_status }}
    - Watcher: {{ watcher_status }}
    - Bot: {{ bot_status }}
    - Scheduler: {{ scheduler_status }}
    
    Resources:
    - CPU: {{ cpu_usage }}%
    - Memory: {{ memory_usage }}%
    - Disk: {{ disk_usage }}%
    
    Metrics (24h):
    - Messages Processed: {{ messages_processed }}
    - Summaries Generated: {{ summaries_generated }}
    - Digests Published: {{ digests_published }}
    - API Requests: {{ api_requests }}
    - Errors: {{ error_count }}

# Bot message templates
bot:
  # Welcome message template
  welcome: |
    Welcome to MG Digest Bot!
    
    This bot helps you manage your digest subscriptions and settings.
    
    Available commands:
    /help - Show this help message
    /subscribe - Subscribe to digests
    /unsubscribe - Unsubscribe from digests
    /settings - Manage your settings
    /latest - Get the latest digest
  
  # Help message template
  help: |
    MG Digest Bot Help
    
    Available commands:
    /help - Show this help message
    /subscribe - Subscribe to digests
    /unsubscribe - Unsubscribe from digests
    /settings - Manage your settings
    /latest - Get the latest digest
    
    Admin commands:
    /status - Show system status
    /publish - Publish a digest manually
    /sources - Manage sources
    /users - Manage users
  
  # Error message template
  error: |
    Sorry, an error occurred: {{ message }}
    
    Please try again later or contact the administrator.