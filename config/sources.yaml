# Data sources configuration

# Telegram channels and groups
telegram:
  channels:
    - id: -1001234567890
      name: "example_channel"
      language: "ru"
      priority: 1
      categories: ["news", "technology"]
      active: true
    - id: -1009876543210
      name: "another_channel"
      language: "en"
      priority: 2
      categories: ["business", "finance"]
      active: true
  groups:
    - id: -1002345678901
      name: "example_group"
      language: "ru"
      priority: 3
      categories: ["discussion", "community"]
      active: true

# RSS feeds
rss:
  feeds:
    - url: "https://example.com/feed.xml"
      name: "example_feed"
      language: "en"
      priority: 1
      categories: ["news", "technology"]
      active: true
      update_interval: 3600  # 1 hour in seconds
    - url: "https://another-example.com/rss"
      name: "another_feed"
      language: "ru"
      priority: 2
      categories: ["business", "finance"]
      active: true
      update_interval: 7200  # 2 hours in seconds

# Web pages to scrape
web_scraping:
  pages:
    - url: "https://example.com/news"
      name: "example_news"
      language: "en"
      priority: 1
      categories: ["news"]
      active: false
      update_interval: 86400  # 24 hours in seconds
      selectors:
        container: ".news-container"
        title: ".news-title"
        content: ".news-content"
        date: ".news-date"

# Source filtering
filtering:
  blocked_domains: ["spam-site.com", "fake-news.org"]
  blocked_keywords: ["spam", "advertisement", "promoted"]
  min_content_length: 100  # Minimum content length in characters
  max_content_length: 10000  # Maximum content length in characters

# Source processing
processing:
  parallel_requests: 5  # Number of parallel requests
  request_timeout: 30  # Request timeout in seconds
  retry_count: 3  # Number of retries for failed requests
  retry_delay: 5  # Delay between retries in seconds
  user_agent: "MG Digest Bot/1.0"  # User agent for HTTP requests