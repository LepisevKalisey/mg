# Components configuration

# Watcher component
watcher:
  enabled: true
  poll_interval: 300  # 5 minutes in seconds
  batch_size: 100
  max_retries: 3
  retry_delay: 60  # seconds
  source_types:
    - telegram_channel
    - telegram_group
  fetch_limit: 50  # Maximum number of messages to fetch per source

# Worker component
worker:
  enabled: true
  concurrency: 2
  prefetch_count: 10
  task_timeout: 300  # 5 minutes in seconds
  max_retries: 3
  retry_delay: 60  # seconds
  tasks:
    summarize:
      batch_size: 10
      priority: 10
    publish_digest:
      batch_size: 1
      priority: 20

# Bot component
bot:
  enabled: true
  command_prefix: "!"
  admin_commands:
    - help
    - status
    - add_source
    - remove_source
    - list_sources
    - add_topic
    - remove_topic
    - list_topics
    - create_digest
    - schedule_digest
    - cancel_digest
    - approve_summary
    - reject_summary
  user_commands:
    - help
    - status
  inline_query_enabled: true
  webhook_enabled: false
  webhook_url: ""

# Scheduler component
scheduler:
  enabled: true
  jobs:
    fetch_sources:
      cron: "*/5 * * * *"  # Every 5 minutes
      timezone: "UTC"
    process_summaries:
      cron: "*/10 * * * *"  # Every 10 minutes
      timezone: "UTC"
    publish_digests:
      cron: "0 9 * * *"  # Every day at 9 AM
      timezone: "UTC"
    cleanup_old_data:
      cron: "0 0 * * 0"  # Every Sunday at midnight
      timezone: "UTC"