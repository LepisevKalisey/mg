# Logging configuration

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  json:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"
    class: pythonjsonlogger.jsonlogger.JsonFormatter

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: ./logs/app.log
    maxBytes: 10485760  # 10 MB
    backupCount: 5
    encoding: utf8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: standard
    filename: ./logs/error.log
    maxBytes: 10485760  # 10 MB
    backupCount: 5
    encoding: utf8

loggers:
  app:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

  app.watcher:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

  app.worker:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

  app.bot:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

  app.db:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

  telethon:
    level: WARNING
    handlers: [console, file, error_file]
    propagate: false

  sqlalchemy:
    level: WARNING
    handlers: [console, file, error_file]
    propagate: false

root:
  level: INFO
  handlers: [console, file, error_file]
  propagate: false