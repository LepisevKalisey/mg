# Nixpacks configuration for worker service
[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "python311Packages.setuptools",
  "python311Packages.wheel",
  "postgresql",
  "curl",
  "gcc"
]

[phases.install]
cmds = [
  "python3.11 -m pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
cmds = [
  "python3.11 -m compileall -f app",
  "python3.11 -c 'import psycopg2; print("PostgreSQL driver ready")'",
  "python3.11 -c 'import redis; print("Redis client ready")'"
]

[start]
cmd = "python3.11 -m app.worker"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONPATH = "/app"
PORT = "8000"
DATABASE_URL = "postgresql://postgres:postgres@localhost:5432/mg"
REDIS_URL = "redis://localhost:6379"
NIXPACKS_PATH = "/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin"