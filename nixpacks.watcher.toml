# Nixpacks configuration for watcher service
[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "python311Packages.setuptools",
  "python311Packages.wheel",
  "postgresql",
  "curl",
  "gcc"
]

[phases.install]
cmds = [
  "python -m pip install --no-cache-dir --upgrade pip setuptools wheel",
  "python -m pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
cmds = [
  "python -m compileall -f app",
  "python -c 'import psycopg2; print(\"PostgreSQL driver ready\")'",
  "python -c 'import redis; print(\"Redis client ready\")'"
]

[start]
cmd = "python -m app.watcher"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONPATH = "/app"
DATABASE_URL = "postgresql://postgres:postgres@localhost:5432/mg"
REDIS_URL = "redis://localhost:6379"