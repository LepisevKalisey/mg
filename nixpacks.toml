# Nixpacks configuration for Python application
[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "postgresql", "curl", "gcc"]

[phases.install]
cmds = [
  "python3.11 -m pip install --upgrade pip",
  "python3.11 -m pip install -r requirements.txt"
]

[phases.build]
cmds = ["python3.11 -c 'print(\"Build successful\")'"]

[start]
cmd = "python3.11 run_web.py"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONPATH = "/app"